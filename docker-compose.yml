services:
  postgres:
    image: postgres:16
    container_name: zehut-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zehut
    ports:
      - "5432:5432"
    volumes:
      - zehut-pg-data:/var/lib/postgresql/data

volumes:
  zehut-pg-data:
