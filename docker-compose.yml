services:
  postgres:
    image: postgres:16
    container_name: zehut-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zehut
    ports:
      - "5432:5432"
    volumes:
      - zehut-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zehut"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  zehut-pg-data:
